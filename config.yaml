service-name: "API Gateway"

server:
  port: 8080

routes:
  - path: /api/users
    targets:
      - "http://user-service:8001"
      - "http://user-service:8002"
      - "http://user-service:8003"
    methods: ["GET", "POST"]
    headers:
      set:
        X-Gateway-Auth: "authenticated"
        X-Custom-ID: "gopher-123"
      remove:
        - X-Internal-Secret
        - X-Forwarded-For
        - Cookie
    strip-prefix: true
    balancer: round_robin
    middlewares:
      - jwt_validation
      - rate_limit
      - logging
